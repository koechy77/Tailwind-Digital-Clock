<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character counter</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <main class="CC gap-5">
        <h1>Character Counter</h1>
        <section class="p">
            <p>Type your text here...</p>
        </section>
        <section class="grid">
            <div class="grid1">
                <span>Characters</span>
                <span>0</span>
            </div>
            <div class="grid2">
                <span>Words</span>
                <span>0</span>
            </div>
            <div class="grid3">
                <span>Sentences</span>
                <span>0</span>
            </div>
        </section>
        <section class="cp">
            <p>Copy Text</p>
        </section>
    </main>
    
</body>
</html>
