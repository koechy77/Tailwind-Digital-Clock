<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <main class="clock">
        <h1>Digital Clock</h1>
        <section id="time">
            <div>
                <span>00</span>
                <span>hours</span>
            </div>
            <div>
                <span>00</span>
                <span>mins</span>
            </div>
            <div>
                <span>00</span>
                <span>secs</span>
            </div>
            <div>
                <span>00</span>
                <span>msec</span>
            </div>
        </section>
        <section id="date">
            <span class="date-label">Date</span>
            <span class="date-value">00-00-00</span>
        </section>
    </main>
    <script src="./clock.js"></script>
    
</body>
</html>
